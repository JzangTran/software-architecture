services:
  register-service:
    build:
      context: ./register-service
      dockerfile: Dockerfile
    container_name: register-service
    ports:
      - "8386:8080"
    restart: unless-stopped

  login-service:
    build:
      context: ./login-service
      dockerfile: Dockerfile
    container_name: login-service
    ports:
      - "8082:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - register-service
      - login-service
    restart: unless-stopped